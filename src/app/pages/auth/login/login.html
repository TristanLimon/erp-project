<p-toast position="top-right" />

<div class="login-wrap">
  <!-- PANEL IZQUIERDO -->
  <div class="left-panel flex flex-column justify-content-between p-5">
    <!-- Logo con easter egg: 5 clicks → toast "catch u" -->
    <span class="logo" (click)="onLogoClick()" style="cursor:pointer;user-select:none">
      erp<span class="logo-dot">.</span>
    </span>

    <div class="flex flex-column gap-3">
      <div class="creds-panel">
        <span class="creds-title">Sistema ERP de Tickets</span>
        <p style="color:#b8adec;font-size:.82rem;margin-top:.75rem;line-height:1.6">
          Gestión de tickets en modo Kanban o Lista.<br>
          Permisos por usuario y grupo.
        </p>
      </div>

      <p style="color:#a89cff;font-size:.82rem;font-style:italic;margin-top:1rem;text-align:center">
        "La simplicidad es la máxima sofisticación." — da Vinci
      </p>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right-panel flex align-items-center justify-content-center p-4">
    <div style="width:100%;max-width:420px">

      <div class="flex flex-column gap-2 mb-5">
        <h1 class="form-title">Bienvenido de nuevo</h1>
        <span class="form-sub">Ingresa tus credenciales para continuar</span>
      </div>

      <div class="flex flex-column gap-4">
        <!-- Email -->
        <div class="flex flex-column gap-2">
          <label class="field-label">Correo electrónico</label>
          <p-iconfield>
            <p-inputicon class="pi pi-envelope" />
            <input pInputText type="email" [(ngModel)]="email" (blur)="emailTocado = true"
                   placeholder="tu@correo.com" style="width:100%"
                   [style]="emailInvalido ? {'border-color':'#ef4444'} : {}" />
          </p-iconfield>
          @if (emailInvalido) {
            <p-message severity="error" text="Ingresa un correo válido" styleClass="w-full" />
          }
        </div>

        <!-- Password -->
        <div class="flex flex-column gap-2">
          <label class="field-label">Contraseña</label>
          <p-password [(ngModel)]="password" (onBlur)="passwordTocado = true"
                      placeholder="••••••••" [feedback]="false" [toggleMask]="true"
                      styleClass="w-full" [inputStyle]="{'width':'100%'}"
                      [inputStyleClass]="passwordInvalida ? 'ng-invalid ng-dirty' : ''" />
          @if (passwordInvalida) {
            <p-message severity="error" text="La contraseña es requerida" styleClass="w-full" />
          }
        </div>

        <p-button label="Iniciar sesión" icon="pi pi-sign-in" iconPos="right"
                  [loading]="cargando" [disabled]="!formularioValido"
                  styleClass="w-full justify-content-center login-btn"
                  (onClick)="iniciarSesion()" />

        <p-divider />

        <div class="text-center" style="color:#4a3a8a;font-size:.88rem">
          ¿No tienes cuenta?
          <p-button label="Regístrate" variant="text" (onClick)="irRegister()"
                    [style]="{'color':'#6c47ff','font-weight':'700','padding':'0 .25rem','font-size':'.88rem'}" />
        </div>
      </div>
    </div>
  </div>
</div>
